<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Atendimento com o Padre - Pastoral Universitária</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-blue: #0056b3;
            --light-blue: #eef2f6;
            --text-main: #1f2937;
            --text-muted: #6b7280;
            --bg-color: #f3f4f6;
            --card-bg: #ffffff;
        }

        body {
            font-family: 'Inter', sans-serif;
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            -webkit-font-smoothing: antialiased;
        }

        header {
            background-color: var(--primary-blue);
            padding: 1rem 2rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
        }

        header nav {
            max-width: 800px;
            margin: 0 auto;
            display: flex;
            gap: 15px;
            flex-wrap: wrap; 
        }

        header nav a {
            color: #fff;
            text-decoration: none;
            font-size: 14px;
            font-weight: 500;
            padding: 8px 16px;
            border-radius: 6px;
            background-color: rgba(255, 255, 255, 0.1);
            transition: background-color 0.2s;
        }

        header nav a:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }

        .page-header {
            text-align: center;
            margin-bottom: 40px;
        }

        h1 {
            color: var(--text-main);
            font-size: 28px;
            font-weight: 700;
            margin: 0 0 10px 0;
        }

        .subtitle {
            font-size: 15px;
            color: var(--text-muted);
            margin: 0;
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 30px;
            margin-bottom: 24px;
            box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1), 0 1px 2px 0 rgba(0, 0, 0, 0.06);
            border: 1px solid #e5e7eb;
            text-align: center;
        }

        .btn-back {
            display: inline-block;
            margin-bottom: 20px;
            color: var(--primary-blue);
            text-decoration: none;
            font-weight: 500;
            font-size: 15px;
        }

        .btn-back:hover {
            text-decoration: underline;
        }
        
      
        .calendario-container {
            width: 100%;
            min-height: 650px;
            border: none;
            margin-top: 20px;
            border-radius: 8px;
        }

        footer {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-muted);
            font-size: 13px;
        }
    </style>
</head>
<body>

    <header>
        <nav>
            <a href="../">Início</a>
            <a href="../#atividades">Atividades</a>
            <a href="../#contato">Contato</a>
            <a href="../igrejas">Igrejas Próximas</a>
            <a href="" class="active">Confissão</a>
        </nav>
    </header>

    <main class="container">
        
        <a href="index.html" class="btn-back">← Voltar para a página inicial</a>

        <div class="page-header">
            <h1>Agendar Atendimento</h1>
            <p class="subtitle">Escolha um horário disponível abaixo para conversar com o Padre, confessar-se ou pedir orientação espiritual.</p>
        </div>

        <section class="card">
            
            <iframe 
                src="https://calendar.google.com/calendar/u/0/appointments/schedules/AcZssZ3DeEecIQhySuHv4PTAvdLpmTlX34tBOAYHeNxrCATkLMkBa5QZUezNxm09FydzTmllij4Q3WvS" 
                class="calendario-container"
                title="Agendamento de Atendimento">
            </iframe>

        </section>

    </main>

    <footer>
        <p>© 2026 Pastoral Universitária da Unicamp. Todos os direitos reservados.</p>
    </footer>

</body>
</html>
